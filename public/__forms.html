<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms Blueprint</title>
</head>
<body>
  <!-- This file is processed by Netlify's form scanner at build time. -->
  <form name="inquiry-notification" method="POST" data-netlify="true" hidden>
    <input type="hidden" name="form-name" value="inquiry-notification" />
    <input type="text" name="inquiryId" />
    <input type="text" name="referenceCode" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="phone" />
    <input type="text" name="eventDate" />
    <input type="text" name="eventType" />
    <input type="text" name="fulfillmentMethod" />
    <input type="text" name="budgetRange" />
    <input type="text" name="budgetFlexibility" />
    <input type="text" name="items" />
    <input type="text" name="adminUrl" />
    <textarea name="notes"></textarea>
  </form>
</body>
</html>
